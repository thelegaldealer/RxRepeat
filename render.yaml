databases:
  - name: unimaster_db
    databaseName: unimaster
    user: unimaster_user
    plan: free # Explicitly use Free tier

services:
  - type: web
    name: unimaster_backend
    env: python
    rootDir: backend # Set the working directory to backend
    plan: free # Explicitly use Free tier
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --no-input"
    startCommand: "python manage.py migrate && python manage.py create_owner && python manage.py setup_academic_structure && gunicorn unimaster_backend.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: GEMINI_API_KEY
        sync: false # Do not commit the key, set it in dashboard
      - key: GOOGLE_CREDENTIALS_JSON
        sync: false # Set this in dashboard with base64 encoded content of service-account-key.json
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: ALLOWED_HOSTS
        value: "*" # Update this with your actual Render URL after first deploy
      - key: CORS_ALLOWED_ORIGINS
        value: "https://rx-repeat-6yzg.vercel.app"
      - key: DATABASE_URL
        fromDatabase:
          name: unimaster_db
          property: connectionString
